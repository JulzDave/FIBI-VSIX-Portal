openapi: 3.0.0
info:
  title: VS Code Marketplace Internal API
  version: 1.0.0
  description: Unified specification for extension search, version history, and VSIX downloads.

servers:
  - url: https://marketplace.visualstudio.com
    description: Main Marketplace Metadata Server

# Indicates endpoints are public by default, but provides a hook for future security layers
security:
  - {} 

paths:
  /_apis/public/gallery/extensionquery:
    post:
      operationId: queryExtensionGallery
      summary: Extension Query Service
      description: |
        A multi-purpose endpoint for the VS Code Marketplace. 
        - **Search Mode:** Performs broad searches (e.g., by keyword or platform).
        - **Version History Mode:** Retrieves specific extension metadata including all available versions.
      parameters:
        - in: query
          name: api-version
          required: true
          schema:
            type: string
            default: "3.0-preview.1"
          description: Required API version parameter.
        - in: header
          name: Accept
          required: false
          schema:
            type: string
            default: "application/json;api-version=3.0-preview.1"
          description: Optional, but good practice to include.
        - in: header
          name: User-Agent
          required: false
          schema:
            type: string
            default: "VSCode 1.85.0"
          description: Highly recommended. The Marketplace can throttle or reject requests that lack a standard client User-Agent.
        - in: header
          name: accept-encoding
          required: false
          schema:
            type: string
            example: "gzip, deflate, br, zstd"
        - in: header
          name: accept-language
          required: false
          schema:
            type: string
            example: "en-US"
        - in: header
          name: origin
          required: false
          schema:
            type: string
            example: "vscode-file://vscode-app"
        - in: header
          name: priority
          required: false
          schema:
            type: string
            example: "u=1, i"
        - in: header
          name: sec-ch-ua
          required: false
          schema:
            type: string
            example: '"Not_A Brand";v="99", "Chromium";v="142"'
        - in: header
          name: sec-ch-ua-mobile
          required: false
          schema:
            type: string
            example: "?0"
        - in: header
          name: sec-ch-ua-platform
          required: false
          schema:
            type: string
            example: '"Windows"'
        - in: header
          name: sec-fetch-dest
          required: false
          schema:
            type: string
            example: "empty"
        - in: header
          name: sec-fetch-mode
          required: false
          schema:
            type: string
            example: "cors"
        - in: header
          name: sec-fetch-site
          required: false
          schema:
            type: string
            example: "cross-site"
        - in: header
          name: vscode-sessionid
          required: false
          schema:
            type: string
            example: "4e1ce15f11f1144aa166492bc11d9c4f08d092ebb8959e23e03c9eee96f76384"
        - in: header
          name: x-market-client-id
          required: false
          schema:
            type: string
            example: "VSCode 1.108.2"
        - in: header
          name: x-market-user-id
          required: false
          schema:
            type: string
            example: "da6d241f-e534-464d-869b-22dcc465488f"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/SearchRequest'
                - $ref: '#/components/schemas/VersionHistoryRequest'
            examples:
              SearchExample:
                summary: Initial Search (Flag 870)
                value:
                  filters:
                    - criteria:
                        - filterType: 10
                          value: "csharpier"
                        - filterType: 8
                          value: "Microsoft.VisualStudio.Code"
                      pageNumber: 1
                      pageSize: 20
                      sortBy: 0
                      sortOrder: 0
                  assetTypes: []
                  flags: 870
              VersionHistoryExample:
                summary: Fetch Full Version History (Flag 359)
                value:
                  filters:
                    - criteria:
                        - filterType: 7
                          value: "csharpier.csharpier-vscode"
                  assetTypes: []
                  flags: 359
      responses:
        '200':
          $ref: '#/components/responses/QueryResponse'
        '400':
          $ref: '#/components/responses/MarketplaceError'
        '503':
          $ref: '#/components/responses/RateLimitError'
        default:
          $ref: '#/components/responses/MarketplaceError'

  /_apis/public/gallery/publisher/{publisher}/extension/{extensionName}/{version}/assetbyname/Microsoft.VisualStudio.Services.VSIXPackage:
    get:
      summary: Download VSIX Package
      description: |
        Downloads the compiled binary `.vsix` extension package from the CDN.
          - **`publisherSubdomain`** should match the `{publisher}` path parameter.
      operationId: downloadVsix
      servers:
        - url: https://{publisherSubdomain}.gallery.vsassets.io
          variables:
            publisherSubdomain:
              default: csharpier
              description: >
                Matches the {publisher} path parameter. 
                Examples you can try: `csharpier`, `lmcarreiro`, or `vscode-icons-team`.
      parameters:
        - in: path
          name: publisher
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
          description: The publisher name (e.g., ms-python)
          examples:
            combination1:
              value: "csharpier"
              summary: CSharpier Example
            combination2:
              value: "lmcarreiro"
              summary: Smart Column Example
        - in: path
          name: extensionName
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
          description: The extension ID (e.g., python)
          examples:
            combination1:
              value: "csharpier-vscode"
              summary: CSharpier Example
            combination2:
              value: "vscode-smart-column-indenter"
              summary: Smart Column Example
        - in: path
          name: version
          required: true
          schema:
            type: string
            pattern: '^\d+\.\d+\.\d+.*$'
          description: Specific version string (e.g., 2023.10.1)
          examples:
            combination1:
              value: "10.0.1"
              summary: CSharpier Example
            combination2:
              value: "0.0.13"
              summary: Smart Column Example
        - in: header
          name: accept
          required: false
          schema:
            type: string
            example: "*/*"
        - in: header
          name: accept-encoding
          required: false
          schema:
            type: string
            example: "gzip, deflate, br, zstd"
        - in: header
          name: accept-language
          required: false
          schema:
            type: string
            example: "en-US"
        - in: header
          name: connection
          required: false
          schema:
            type: string
            example: "keep-alive"
        - in: header
          name: host
          required: false
          schema:
            type: string
            example: "jock.gallerycdn.vsassets.io"
        - in: header
          name: origin
          required: false
          schema:
            type: string
            example: "null"
        - in: header
          name: sec-ch-ua
          required: false
          schema:
            type: string
            example: '"Not_A Brand";v="99", "Chromium";v="142"'
        - in: header
          name: sec-ch-ua-mobile
          required: false
          schema:
            type: string
            example: "?0"
        - in: header
          name: sec-ch-ua-platform
          required: false
          schema:
            type: string
            example: '"Windows"'
        - in: header
          name: sec-fetch-dest
          required: false
          schema:
            type: string
            example: "empty"
        - in: header
          name: sec-fetch-mode
          required: false
          schema:
            type: string
            example: "cors"
        - in: header
          name: sec-fetch-site
          required: false
          schema:
            type: string
            example: "cross-site"
        - in: header
          name: user-agent
          required: false
          schema:
            type: string
            example: "VSCode 1.108.2 (Code)"
        - in: header
          name: vscode-sessionid
          required: false
          schema:
            type: string
            example: "4e1ce15f11f1144aa166492bc11d9c4f08d092ebb8959e23e03c9eee96f76384"
        - in: header
          name: x-market-client-id
          required: false
          schema:
            type: string
            example: "VSCode 1.108.2"
        - in: header
          name: x-market-user-id
          required: false
          schema:
            type: string
            example: "da6d241f-e534-464d-869b-22dcc465488f"
      responses:
        '200':
          description: The binary VSIX package payload.
          headers:
            access-control-allow-origin:
              schema:
                type: string
            access-control-expose-headers:
              schema:
                type: string
            cache-control:
              schema:
                type: string
            connection:
              schema:
                type: string
            content-length:
              schema:
                type: integer
            date:
              schema:
                type: string
            etag:
              schema:
                type: string
            last-modified:
              schema:
                type: string
            x-ms-blob-type:
              schema:
                type: string
            x-ms-lease-status:
              schema:
                type: string
            x-ms-request-id:
              schema:
                type: string
            x-ms-version:
              schema:
                type: string
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/MarketplaceError'
        '404':
          $ref: '#/components/responses/MarketplaceError'
        '503':
          $ref: '#/components/responses/RateLimitError'
        default:
          $ref: '#/components/responses/MarketplaceError'
  /extensions/{publisher}/{extensionName}/{version}/{timestamp}/Microsoft.VisualStudio.Code.Manifest:
    get:
      summary: Download Extension Manifest
      description: |
        Retrieves the `Microsoft.VisualStudio.Code.Manifest` (`package.json`) from the CDN for a specific extension, version, and build timestamp.
      operationId: getExtensionManifest
      servers:
        - url: https://{publisherSubdomain}.gallerycdn.vsassets.io
          variables:
            publisherSubdomain:
              default: csharpier
              description: Matches the {publisher} path parameter.
      parameters:
        - in: path
          name: publisher
          required: true
          schema:
            type: string
            example: "csharpier"
          description: The publisher name.
        - in: path
          name: extensionName
          required: true
          schema:
            type: string
            example: "csharpier-vscode"
          description: The extension name/ID.
        - in: path
          name: version
          required: true
          schema:
            type: string
            example: "10.0.1"
          description: The specific version of the extension.
        - in: path
          name: timestamp
          required: true
          schema:
            type: string
            example: "1770651028620"
          description: The internal timestamp/build ID of the uploaded package. It should be taken from the `extensionquery` response in the `assetUri` property value.
        - in: header
          name: accept
          required: false
          schema:
            type: string
            default: "*/*"
        - in: header
          name: accept-encoding
          required: false
          schema:
            type: string
            example: "gzip, deflate, br, zstd"
        - in: header
          name: accept-language
          required: false
          schema:
            type: string
            example: "en-US"
        - in: header
          name: connection
          required: false
          schema:
            type: string
            example: "keep-alive"
        - in: header
          name: origin
          required: false
          schema:
            type: string
            example: "vscode-file://vscode-app"
        - in: header
          name: user-agent
          required: false
          schema:
            type: string
            example: "VSCode 1.108.2 (Code)"
        - in: header
          name: vscode-sessionid
          required: false
          schema:
            type: string
            example: "4e1ce15f11f1144aa166492bc11d9c4f08d092ebb8959e23e03c9eee96f76384"
        - in: header
          name: x-market-client-id
          required: false
          schema:
            type: string
            example: "VSCode 1.108.2"
        - in: header
          name: x-market-user-id
          required: false
          schema:
            type: string
            example: "da6d241f-e534-464d-869b-22dcc465488f"
      responses:
        '200':
          description: OK - Returns the extension manifest payload.
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=31536000"
            Content-Length:
              schema:
                type: integer
                example: 1589
            Content-Encoding:
              schema:
                type: string
                example: "gzip"
            Last-Modified:
              schema:
                type: string
                example: "Sat, 14 Jun 2025 01:26:49 GMT"
            ETag:
              schema:
                type: string
                example: "0x8DDAAE2893BCEB1"
            x-ms-request-id:
              schema:
                type: string
                example: "6306259d-001e-004a-77c3-b6f760000000"
            x-ms-version:
              schema:
                type: string
                example: "2009-09-19"
            x-ms-lease-status:
              schema:
                type: string
                example: "unlocked"
            x-ms-blob-type:
              schema:
                type: string
                example: "BlockBlob"
            Access-Control-Expose-Headers:
              schema:
                type: string
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Vary:
              schema:
                type: string
                example: "Accept-Encoding"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionManifest'
components:
  responses:
    QueryResponse:
      description: Successful query response.
      headers:
        access-control-allow-methods:
          schema:
            type: string
            example: "OPTIONS,GET,POST,PATCH,PUT,DELETE"
        access-control-allow-origin:
          schema:
            type: string
            example: "*"
        access-control-expose-headers:
          schema:
            type: string
            example: "ActivityId,Request-Context"
        access-control-max-age:
          schema:
            type: integer
            example: 3600
        activityid:
          schema:
            type: string
            example: "b7c47f64-f274-44bd-a3c4-5c6877b3af3d"
        cache-control:
          schema:
            type: string
            example: "no-cache, no-store, must-revalidate"
        content-encoding:
          schema:
            type: string
            example: "gzip"
        date:
          schema:
            type: string
            example: "Tue, 17 Mar 2026 13:43:54 GMT"
        region:
          schema:
            type: string
            example: "EUS2"
        request-context:
          schema:
            type: string
            example: "appId=cid-v1:8314cee3-137b-4671-85f0-0ebbe0d65ec2"
        strict-transport-security:
          schema:
            type: string
            example: "max-age=2592000"
        vary:
          schema:
            type: string
            example: "Accept-Encoding"
        x-cache:
          schema:
            type: string
            example: "CONFIG_NOCACHE"
        x-content-type-options:
          schema:
            type: string
            example: "nosniff"
        x-geo:
          schema:
            type: string
            example: "VSCodeSearchQueryGlobal_ExtensionQuery"
        x-msedge-ref:
          schema:
            type: string
            example: "Ref A: 8CE394ACA9374C29B4FE1288547A0744 Ref B: TLV231050412060 Ref C: 2026-03-17T13:43:54Z"
        x-powered-by:
          schema:
            type: string
            example: "ASP.NET"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/QueryResponseBody'
            
    MarketplaceError:
      description: Standardized error response for bad requests, missing resources, or generic failures.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            $id: "1"
            innerException: null
            message: "Invalid api version string: \"123asd\". Api version string must be in the format: {Major}.{Minor}[-preview[.{ResourceVersion}]]."
            typeName: "Microsoft.VisualStudio.Services.WebApi.VssInvalidApiResourceVersionException, Microsoft.VisualStudio.Services.WebApi"
            typeKey: "VssInvalidApiResourceVersionException"
            errorCode: 0
            eventId: 3000

    RateLimitError:
      description: Service Unavailable. The Marketplace is throttling or rejecting the request.

  schemas:
    # --- Error Schema ---
    ErrorResponse:
      type: object
      description: Standard Microsoft VSS WebApi Exception payload.
      properties:
        $id:
          type: string
        innerException:
          type: object
          nullable: true
        message:
          type: string
        typeName:
          type: string
        typeKey:
          type: string
        errorCode:
          type: integer
        eventId:
          type: integer

    # --- Request Schemas ---
    QueryRequestBase:
      type: object
      properties:
        assetTypes:
          type: array
          items:
            type: string
          default: []
        flags:
          type: integer
          format: int32
          description: |
            **Bitwise Flags for Extension Metadata**
            This integer is a bitmask used to specify exactly which metadata the server should return. Instead of sending multiple boolean fields, you send a single integer representing the sum of your desired options.

            **Available Flags (Powers of 2):**
            * **1**: Include Versions
            * **2**: Include Files (the CDN links)
            * **4**: Include Category and Tags
            * **16**: Include Version Properties
            * **32**: Exclude Non-Validated Extensions
            * **64**: Include Installation Targets
            * **128**: Include Asset URIs
            * **256**: Include Statistics (Downloads, Ratings)
            * **512**: Include Latest Version Only

            **How it Works:**
            To request multiple data points, add their values together (using a Bitwise OR operation). For example, to get Files (2) + Categories (4) + Statistics (256), you would send `262`.

            **Common Combinations:**
            * **133**: Minimal data
            * **359**: Include all versions (Standard for Version History queries)
            * **870**: Common Search Mask (Combines 512 + 256 + 64 + 32 + 4 + 2)
            * **914**: Standard Broad Search (Includes maximum metadata)

            *Note: While you send these flags as an integer in the request body, the API often returns the `Extension.flags` property as a comma-separated string in the response (e.g., "validated, public").*
    SearchRequest:
      description: Request schema for keyword or platform searches.
      allOf:
        - $ref: '#/components/schemas/QueryRequestBase'
        - type: object
          properties:
            filters:
              type: array
              items:
                type: object
                properties:
                  pageNumber: { type: integer, default: 1 }
                  pageSize: { type: integer, default: 20 }
                  sortBy: { type: integer, default: 0 }
                  sortOrder: { type: integer, default: 0 }
                  criteria:
                    type: array
                    items:
                      type: object
                      properties:
                        filterType: { type: integer, description: "10 = search text, 8 = target platform" }
                        value: { type: string }

    VersionHistoryRequest:
      description: Request schema for deep-diving into a specific extension.
      allOf:
        - $ref: '#/components/schemas/QueryRequestBase'
        - type: object
          properties:
            filters:
              type: array
              items:
                type: object
                properties:
                  criteria:
                    type: array
                    items:
                      type: object
                      properties:
                        filterType: { type: integer, default: 7, description: "7 = Fully Qualified Name" }
                        value: { type: string, description: "Format: publisher.extensionName" }

    # --- Response Schemas ---
    QueryResponseBody:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Result'

    Result:
      type: object
      properties:
        extensions:
          type: array
          items:
            $ref: '#/components/schemas/Extension'
        pagingToken:
          type: string
          nullable: true
        resultMetadata:
          type: array
          items:
            $ref: '#/components/schemas/ResultMetadatum'

    Extension:
      type: object
      properties:
        publisher:
          $ref: '#/components/schemas/Publisher'
        extensionId:
          type: string
          format: uuid
        extensionName:
          type: string
        displayName:
          type: string
        flags:
          type: string
          description: "Comma-separated string of returned attributes (e.g., 'validated, public'). Note: This is distinct from the integer bitmask used in the request body."
        lastUpdated:
          type: string
          format: date-time
        publishedDate:
          type: string
          format: date-time
        releaseDate:
          type: string
          format: date-time
        shortDescription:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Version'
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        statistics:
          type: array
          items:
            $ref: '#/components/schemas/Statistic'
        installationTargets:
          type: array
          items:
            $ref: '#/components/schemas/InstallationTarget'
        deploymentType:
          type: integer

    InstallationTarget:
      type: object
      properties:
        target:
          type: string
        targetVersion:
          type: string

    Publisher:
      type: object
      properties:
        publisherId:
          type: string
          format: uuid
        publisherName:
          type: string
        displayName:
          type: string
        flags:
          type: string
        domain:
          type: string
        isDomainVerified:
          type: boolean

    Statistic:
      type: object
      properties:
        statisticName:
          type: string
        value:
          type: number

    Version:
      type: object
      properties:
        version:
          type: string
        flags:
          type: string
        lastUpdated:
          type: string
          format: date-time
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'
        properties:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        assetUri:
          type: string
          format: uri
        fallbackAssetUri:
          type: string
          format: uri

    File:
      type: object
      properties:
        assetType:
          type: string
        source:
          type: string
          format: uri

    Property:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    ResultMetadatum:
      type: object
      properties:
        metadataType:
          type: string
        metadataItems:
          type: array
          items:
            $ref: '#/components/schemas/MetadataItem'

    MetadataItem:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
    ExtensionManifest:
      type: object
      description: A generic representation of a VS Code extension package.json manifest.
      required:
        - name
        - version
        - publisher
        - engines
      properties:
        name:
          type: string
          description: The internal name of the extension.
        displayName:
          type: string
          description: The display name for the extension used in the Marketplace.
        description:
          type: string
          description: A short description of the extension.
        version:
          type: string
          description: The extension version.
        publisher:
          type: string
          description: The publisher name.
        license:
          type: string
        homepage:
          type: string
          format: uri
        repository:
          $ref: '#/components/schemas/ManifestRepository'
        bugs:
          $ref: '#/components/schemas/ManifestBugs'
        icon:
          type: string
          description: The path to the extension's icon.
        engines:
          $ref: '#/components/schemas/ManifestEngines'
        categories:
          type: array
          items:
            type: string
        activationEvents:
          type: array
          items:
            type: string
        main:
          type: string
          description: The entry point to the extension.
        contributes:
          $ref: '#/components/schemas/ManifestContributes'
        scripts:
          type: object
          description: Key-value map of npm scripts.
          additionalProperties:
            type: string
        devDependencies:
          type: object
          description: Key-value map of development dependencies.
          additionalProperties:
            type: string
        dependencies:
          type: object
          description: Key-value map of runtime dependencies.
          additionalProperties:
            type: string
      additionalProperties: true

    ManifestBugs:
      type: object
      properties:
        url:
          type: string
          format: uri
        email:
          type: string

    ManifestEngines:
      type: object
      properties:
        vscode:
          type: string
      additionalProperties:
        type: string

    ManifestRepository:
      type: object
      properties:
        type:
          type: string
        url:
          type: string
          format: uri

    ManifestContributes:
      type: object
      description: All contribution points for the extension (commands, themes, configuration, etc.).
      properties:
        languages:
          type: array
          items:
            $ref: '#/components/schemas/ManifestLanguage'
        grammars:
          type: array
          items:
            $ref: '#/components/schemas/ManifestGrammar'
        commands:
          type: array
          items:
            $ref: '#/components/schemas/ManifestCommand'
        keybindings:
          type: array
          items:
            $ref: '#/components/schemas/ManifestKeybinding'
        menus:
          $ref: '#/components/schemas/ManifestMenus'
        configuration:
          $ref: '#/components/schemas/ManifestConfiguration'
      additionalProperties: true # Allows for unmapped contributions like themes, snippets, taskDefinitions

    ManifestConfiguration:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        properties:
          type: object
          description: Dynamic key-value map of configuration settings provided by the extension.
          additionalProperties:
            $ref: '#/components/schemas/ManifestConfigurationProperty'

    ManifestConfigurationProperty:
      type: object
      properties:
        type:
          type: string
          description: The data type for the configuration (e.g., string, boolean, number, object).
        default:
          description: The default value for this configuration.
          nullable: true
        description:
          type: string
        markdownDescription:
          type: string
        enum:
          type: array
          items: {}
        enumDescriptions:
          type: array
          items:
            type: string
        scope:
          type: string
      additionalProperties: true

    ManifestMenus:
      type: object
      description: Dynamic mapping of menu insertion points (e.g., editor/context, explorer/context) to actions.
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/ManifestMenuAction'

    ManifestMenuAction:
      type: object
      properties:
        when:
          type: string
          description: Condition expression which must be true to show this item.
        command:
          type: string
          description: Command to execute on click.
        group:
          type: string
          description: Sorting group into which this item belongs.
        alt:
          type: string
          description: Alternate command to run when holding Alt/Option.

    ManifestCommand:
      type: object
      properties:
        command:
          type: string
        title:
          type: string
        category:
          type: string
        enablement:
          type: string
        icon:
          type: object
          description: Can be a string or an object with light/dark paths.
          additionalProperties: true

    ManifestLanguage:
      type: object
      properties:
        id:
          type: string
        aliases:
          type: array
          items:
            type: string
        extensions:
          type: array
          items:
            type: string
        configuration:
          type: string
      additionalProperties: true

    ManifestGrammar:
      type: object
      properties:
        language:
          type: string
        scopeName:
          type: string
        path:
          type: string
      additionalProperties: true

    ManifestKeybinding:
      type: object
      properties:
        command:
          type: string
        key:
          type: string
        mac:
          type: string
        win:
          type: string
        linux:
          type: string
        when:
          type: string