<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Corporate Extension Clearinghouse</title>    <style>        :root {            --bg-main: #1e1e1e;            --bg-card: #252526;            --bg-input: #3c3c3c;            --text-main: #cccccc;            --text-title: #ffffff;            --accent: #007acc;            --accent-hover: #005f9e;        }        body {            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;			background: linear-gradient(153.3deg, black, #010118, black);			background-attachment: fixed;            margin: 0;            padding: 40px 20px;        }        .container {            max-width: 1000px;            margin: 0 auto;        }        h1 { color: var(--text-title); text-align: center; margin-bottom: 30px; }        .search-container {            display: flex;            gap: 10px;            margin-bottom: 30px;        }        input[type="text"] {            flex: 1;            padding: 12px 16px;            border: 1px solid #555;            border-radius: 4px;            background-color: #00000042;            color: var(--text-title);            font-size: 16px;        }        button {            padding: 12px 24px;            background-color: var(--accent);            color: white;            border: none;            border-radius: 4px;            font-size: 16px;            font-weight: bold;            cursor: pointer;            transition: background-color 0.2s;        }        button:hover { background-color: var(--accent-hover); }        button:disabled { background-color: #555; cursor: not-allowed; }                #results {       /* Fallback for search results */    display: block;     column-width: 300px; /* Instead of grid-template-columns */    column-gap: 20px;    width: 100%;        }        .card {            background-color: #00000042;			border: 1px solid #444;			border-radius: 6px;			padding: 20px;			display: flex;			flex-direction: column;			gap: 12px;						/* ADD THESE TWO LINES */			break-inside: avoid;			margin-bottom: 20px;        }        .card-header {            display: flex;            gap: 15px;            align-items: center;        }        .icon {            width: 50px;            height: 50px;            border-radius: 8px;            background-color: var(--bg-input);            object-fit: cover;        }        .info { flex: 1; overflow: hidden; }        .title {            color: var(--text-title);            font-size: 1.1rem;            font-weight: bold;            margin: 0 0 4px 0;            white-space: nowrap;            overflow: hidden;            text-overflow: ellipsis;        }        .publisher { color: #9cdcfe; font-size: 0.85rem; margin: 0; }        .desc {            font-size: 0.9rem;            color: #aaa;            display: -webkit-box;            -webkit-line-clamp: 3;            -webkit-box-orient: vertical;            overflow: hidden;            flex-grow: 1;        }        .actions {            display: flex;            flex-direction: column;            gap: 8px;            margin-top: auto;        }                .btn-download-main {            background-color: #2ea043;            width: 100%;        }        .btn-download-main:hover { background-color: #238636; }                .btn-versions {            background-color: transparent;            border: 1px solid #555;            color: #ccc;            width: 100%;        }        .btn-versions:hover { background-color: #333; }                .version-list {            display: none;            background: #00000042;			color: #c2c2c2;            border: 1px solid #444;            border-radius: 4px;            max-height: 200px;            overflow-y: auto;            margin-top: 5px;            padding: 5px;        }        .version-item {            display: flex;            justify-content: space-between;            align-items: center;            padding: 8px;            border-bottom: 1px solid #333;            font-size: 0.85rem;        }        .version-item:last-child { border-bottom: none; }                .btn-download-small {            background-color: #007acc;            padding: 6px 12px;            font-size: 12px;        }        .btn-download-small:hover { background-color: #005f9e; }                .loading { text-align: center; color: #888; font-size: 1.2rem; display: none; grid-column: 1 / -1; }    </style></head><body><div class="container">    <h1>FIBI Visual Studio Code Extension Portal</h1>    <div class="search-container">        <input type="text" id="searchInput" placeholder="Search extensions (e.g., Python, Prettier)..." onkeypress="handleKeyPress(event)">        <button onclick="searchExtensions()">Search</button>    </div>        <div id="loading" class="loading">Querying Marketplace API...</div>    <div id="results"></div></div><script>    const API_URL = 'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery';    const HEADERS = {        'Accept': 'application/json;api-version=3.0-preview.1',        'Content-Type': 'application/json'    };    function handleKeyPress(e) {        if (e.key === 'Enter') searchExtensions();    }    // --- FETCH 1: Initial Search ---    async function searchExtensions() {        const query = document.getElementById('searchInput').value.trim();        if (!query) return;        document.getElementById('loading').style.display = 'block';        document.getElementById('results').innerHTML = '';        const payload = {            filters: [{                criteria: [                    { filterType: 10, value: query },                    { filterType: 8, value: "Microsoft.VisualStudio.Code" }                ],                pageNumber: 1,                pageSize: 20            }],            assetTypes: [],            flags: 870 // Standard flag for fast initial load        };        try {            const response = await fetch(API_URL, {                method: 'POST',                headers: HEADERS,                body: JSON.stringify(payload)            });            const data = await response.json();            document.getElementById('loading').style.display = 'none';            renderResults(data.results[0].extensions);        } catch (error) {            console.error("Search failed:", error);            document.getElementById('loading').innerHTML = "Failed to fetch extensions.";        }    }    function generateDownloadUrl(publisher, extensionName, version) {        return `https://${publisher}.gallery.vsassets.io/_apis/public/gallery/publisher/${publisher}/extension/${extensionName}/${version}/assetbyname/Microsoft.VisualStudio.Services.VSIXPackage`;    }    // --- FETCH 2: Lazy Load Version History ---    async function toggleVersions(buttonElement, publisher, extName) {        const versionList = buttonElement.nextElementSibling;                if (versionList.style.display === 'block') {            versionList.style.display = 'none';            buttonElement.innerText = 'View Previous Versions';            return;        }        if (versionList.innerHTML.trim() !== '') {            versionList.style.display = 'block';            buttonElement.innerText = 'Hide Versions';            return;        }        buttonElement.innerText = 'Loading versions...';        buttonElement.disabled = true;                // filterType 7 explicitly queries the exact extension name        const payload = {            filters: [{                criteria: [{ filterType: 7, value: `${publisher}.${extName}` }]            }],            assetTypes: [],            flags: 359 // Crucial: This flag permits the full version history to be returned        };        try {            const response = await fetch(API_URL, {                method: 'POST',                headers: HEADERS,                body: JSON.stringify(payload)            });            const data = await response.json();                        if (data.results && data.results[0].extensions.length > 0) {                const fullExt = data.results[0].extensions[0];                let versionsHtml = '';                                fullExt.versions.forEach(v => {                    const date = new Date(v.lastUpdated).toLocaleDateString();                    versionsHtml += `                        <div class="version-item">                            <span>v${v.version} (${date})</span>                            <button class="btn-download-small" onclick="downloadVsix(this, '${publisher}', '${extName}', '${v.version}')">Download</button>                        </div>                    `;                });                                versionList.innerHTML = versionsHtml;            } else {                versionList.innerHTML = '<div style="padding: 10px; color: #888;">No history found.</div>';            }                        versionList.style.display = 'block';                    } catch (error) {            console.error("Error fetching versions:", error);            versionList.innerHTML = '<div style="padding: 10px; color: #ff5555;">Failed to load history.</div>';            versionList.style.display = 'block';        } finally {            buttonElement.innerText = 'Hide Versions';            buttonElement.disabled = false;        }    }    // --- FETCH 3: Fetch Blob and Download ---    async function downloadVsix(buttonElement, publisher, extName, version) {        const url = generateDownloadUrl(publisher, extName, version);        const originalText = buttonElement.innerText;                buttonElement.innerText = 'Downloading...';        buttonElement.disabled = true;        try {            // Fetch the binary VSIX file            const response = await fetch(url);            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);                        // Convert the response to a Blob            const blob = await response.blob();                        // Create a temporary object URL for the blob            const objectUrl = window.URL.createObjectURL(blob);                        // Create a hidden anchor tag to trigger the browser's save dialog            const a = document.createElement('a');            a.style.display = 'none';            a.href = objectUrl;            a.download = `${publisher}.${extName}-${version}.vsix`;                        document.body.appendChild(a);            a.click();                        // Cleanup            document.body.removeChild(a);            window.URL.revokeObjectURL(objectUrl);                        buttonElement.innerText = 'Done!';            setTimeout(() => { buttonElement.innerText = originalText; }, 2000);                    } catch (error) {            console.error("Download failed:", error);            buttonElement.innerText = 'Failed';            buttonElement.style.backgroundColor = '#d32f2f'; // Turn red on error                        // Note: If CORS blocks the fetch, you can fall back to direct navigation:            // window.open(url, '_blank');        } finally {            buttonElement.disabled = false;        }    }    function renderResults(extensions) {        const resultsContainer = document.getElementById('results');                if (!extensions || extensions.length === 0) {            resultsContainer.innerHTML = '<p style="text-align:center; color:#888; grid-column: 1/-1;">No extensions found.</p>';            return;        }        extensions.forEach(ext => {            const publisher = ext.publisher.publisherName;            const extName = ext.extensionName;            const displayName = ext.displayName || extName;            const description = ext.shortDescription || "No description available.";            const latestVersion = ext.versions[0].version;                        let iconUrl = '';            const iconFile = ext.versions[0].files.find(f => f.assetType === "Microsoft.VisualStudio.Services.Icons.Default");            if (iconFile) iconUrl = iconFile.source;            const card = document.createElement('div');            card.className = 'card';            card.innerHTML = `                <div class="card-header">                    ${iconUrl ? `<img src="${iconUrl}" class="icon" alt="icon">` : `<div class="icon"></div>`}                    <div class="info">                        <h3 class="title" title="${displayName}">${displayName}</h3>                        <p class="publisher">${ext.publisher.displayName}</p>                    </div>                </div>                <p class="desc" title="${description}">${description}</p>                <div class="actions">                    <button class="btn-download-main" onclick="downloadVsix(this, '${publisher}', '${extName}', '${latestVersion}')">                        Download Latest (v${latestVersion})                    </button>                    <button class="btn-versions" onclick="toggleVersions(this, '${publisher}', '${extName}')">View Previous Versions</button>                    <div class="version-list"></div>                </div>            `;            resultsContainer.appendChild(card);        });    }</script></body></html>
